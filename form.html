<html>
<head>
<title>Simple Form</title>
<style>
body{
    background-image:url('img.jfif');
}
</style>
</head>

<body>
<h2>Contact Form</h2>
<h2 id="message">Welcome</h2>

<form>
<label for="name">Name:</label><br>
<input type="text" id="stuname" name="stuname" required>

<br><br>

Email:
<input type="email" name="email" required>

<br><br>

Password:
<input type="password" name="password" minlength="6" required>

<br><br>

<label for="age">Age:</label><br><br>
<input type="number" name="age" min="18" max="60" required>

<br><br>

<button type="button" onclick="changeText()">ClickMe</button>
</form>

<script>
function changeText() {
    document.getElementById("message").innerHTML = "Hello, Freshers!";
}
</script>

</body>
</html>
